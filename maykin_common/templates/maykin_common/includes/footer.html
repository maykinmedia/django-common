{% load static maykin_common %}
{# Standard/default admin footer layout for our projects #}
{# Django 5.2 already has an outer <footer id="footer"> element #}

{% if user.is_authenticated and user.is_staff %}
    <link rel="stylesheet" href="{% static 'maykin_common/css/maykin_footer.css' %}">
    <div class="maykin_footer">
        <div>
            {% show_product_branding %}
        </div>
        <div>
            {% show_version_info %}
        </div>
    </div>
{% endif %}
